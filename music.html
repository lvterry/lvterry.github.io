---
title: Music | Terry Wang
layout: default
bodyClass: music
---

{% include header.html %}

<div class="container music-page">
  <h1 class="page-title" style="margin-bottom: 12px;">Music</h1>
  <p class="music-subtitle">Lyrics written by me. Songs generated by Suno.</p>

  <div class="music-grid">
    {% for track in site.data.music %}
    <button
      class="track-card"
      data-track-index="{{ forloop.index0 }}"
      aria-label="Play {{ track.title }}"
    >
      <div class="track-cover-wrap">
        <img
          src="{{ track.cover }}"
          alt="{{ track.title }} cover art"
          loading="lazy"
        />
        <div class="track-play-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="currentColor" width="28" height="28">
            <path d="M8 5v14l11-7z"/>
          </svg>
        </div>
      </div>
      <div class="track-info">
        <span class="track-title">{{ track.title }}</span>
        <span class="track-meta">{{ track.year }} · {{ track.duration }}</span>
      </div>
    </button>
    {% endfor %}
  </div>
</div>

<!-- Single player modal, populated by JS when a track card is clicked -->
<div id="music-modal" class="music-modal" aria-modal="true" role="dialog" aria-label="Music player" hidden>
  <div class="modal-backdrop" id="modal-backdrop"></div>

  <div class="modal-panel" role="document">
    <button class="btn-close" id="btn-close" aria-label="Close player">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>

    <!-- Left column: disc + controls -->
    <div class="player-col">
      <div class="player-disc-wrap">
        <div class="disc-ring" aria-hidden="true"></div>
        <img id="player-cover" class="player-cover" src="" alt="" />
        <div class="disc-center" aria-hidden="true"></div>
      </div>

      <div class="player-info">
        <h2 id="player-title" class="player-title"></h2>
        <p id="player-meta" class="player-meta"></p>
        <p id="player-description" class="player-description"></p>
      </div>

      <div class="player-controls">
        <div class="player-progress">
          <span id="time-current" class="time-label">0:00</span>
          <input
            type="range"
            id="progress-bar"
            class="progress-bar"
            min="0"
            max="100"
            value="0"
            step="0.1"
            aria-label="Seek"
          />
          <span id="time-total" class="time-label">0:00</span>
        </div>

        <div class="player-buttons">
          <button class="btn-transport" id="btn-prev" aria-label="Previous track">
            <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22">
              <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
            </svg>
          </button>
          <button class="btn-transport btn-play-pause" id="btn-play" aria-label="Play">
            <svg id="icon-play" viewBox="0 0 24 24" fill="currentColor" width="28" height="28">
              <path d="M8 5v14l11-7z"/>
            </svg>
            <svg id="icon-pause" viewBox="0 0 24 24" fill="currentColor" width="28" height="28" style="display:none">
              <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
            </svg>
          </button>
          <button class="btn-transport" id="btn-next" aria-label="Next track">
            <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22">
              <path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Right column: lyrics -->
    <div class="lyrics-col" id="lyrics-col">
      <h3 class="lyrics-label">Lyrics</h3>
      <div id="lyrics-body" class="lyrics-body"></div>
    </div>
  </div>
</div>

<!-- Embed track data for JS -->
<script>
  const TRACKS = {{ site.data.music | jsonify }};
</script>
<script src="/assets/js/music.js"></script>
