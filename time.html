<!doctype html>
<html lang="en">
  <head>
    <title>How much time left</title>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="chrome=1">
    <meta name="color-scheme" content="dark light">
    <meta name="viewport" content="width=device-width,initial-scale=1,shrink-to-fit=no">
    <meta name="description" content="Check how much time is left in your life">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <style type="text/css">
      body {
        font-family: 'EB Garamond', Georgia, 'Times New Roman', serif;
        background-color: #2942FF;
        background-image: linear-gradient(to bottom, #2942FF, rgba(0,0,0,0));
        color: white;
        margin: 0;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      h1 {
        font-size: 44px;
        font-weight: 500;
        letter-spacing: 0.02em;
        margin: 56px 0 8px;
      }
      .intro {
        font-size: 20px;
        line-height: 1.6;
        opacity: 0.9;
        max-width: 36ch;
        margin: 16px auto 28px;
      }
      canvas {
        width: 600px;
        max-width: 92vw;
        height: auto;
        display: block;
        margin: 32px auto;
      }
      .container {
        width: 100%;
        max-width: 800px;
        text-align: center;
        margin: 0 auto;
        padding: 0 16px 40px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      @media (min-width: 1024px) {
        .container {
          max-width: 1440px;
          min-height: 100vh;
          flex-direction: row;
          justify-content: center;
          gap: 64px;
          padding: 0 48px;
          text-align: left;
        }
        .panel {
          flex: 0 0 auto;
        }
        .intro {
          margin-left: 0;
          margin-right: 0;
        }
        h1 {
          margin-top: 0;
        }
        canvas {
          width: min(600px, calc(100vh - 96px), calc(100vw - 540px));
          min-width: 0;
          margin: 0;
        }
      }
      .form {
        width: 340px;
        max-width: 100%;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      #age {
        width: 100%;
        box-sizing: border-box;
        font-family: inherit;
        font-size: 22px;
        text-align: center;
        padding: 16px 28px;
        border-radius: 999px;
        background-color: white;
        border: none;
        color: #1a1a1a;
        box-shadow: 0 4px 14px rgba(10, 20, 60, 0.25);
        transition: box-shadow 0.3s cubic-bezier(0.32, 0.72, 0, 1);
      }
      #age:focus {
        outline: none;
        box-shadow: 0 4px 14px rgba(10, 20, 60, 0.25), 0 0 0 4px rgba(255, 255, 255, 0.35);
      }
      #checkBtn {
        width: 100%;
        box-sizing: border-box;
        font-family: inherit;
        font-size: 20px;
        font-weight: 500;
        letter-spacing: 0.01em;
        background-color: #FF9F1C;
        color: white;
        border: none;
        border-radius: 999px;
        padding: 16px 44px;
        cursor: pointer;
        box-shadow: 0 4px 14px rgba(10, 20, 60, 0.25);
        transition: transform 0.25s cubic-bezier(0.32, 0.72, 0, 1),
                    box-shadow 0.25s cubic-bezier(0.32, 0.72, 0, 1),
                    background-color 0.25s cubic-bezier(0.32, 0.72, 0, 1);
      }
      #checkBtn:hover {
        background-color: #FF8C00;
        transform: translateY(-2px);
        box-shadow: 0 8px 22px rgba(10, 20, 60, 0.3);
      }
      #checkBtn:active {
        transform: translateY(0) scale(0.97);
        box-shadow: 0 2px 8px rgba(10, 20, 60, 0.25);
      }
      #checkBtn:focus-visible {
        outline: none;
        box-shadow: 0 4px 14px rgba(10, 20, 60, 0.25), 0 0 0 4px rgba(255, 255, 255, 0.35);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="panel">
        <h1>How much time left</h1>
        <p class="intro">Suppose we all die at 90 years old, enter your age below and see how much time you have left.</p>
        <div class="form">
          <input id="age" type="text" name="age" inputmode="numeric">
          <button id="checkBtn">Check my time</button>
        </div>
      </div>
      <canvas></canvas>

      <script>
        var checkBtn = document.getElementById('checkBtn'),
            ageInput = document.getElementById('age'),
            canvas = document.querySelector('canvas'),
            context = canvas.getContext('2d');

        var size = 600;
        var radius = 7;
        var gutter = 2;
        var rows = 36;
        var cols = 30;
        var totalDots = rows * cols; // 1080 dots = 90 years x 12 months
        var cell = 2 * radius + gutter;
        var offsetX = (size - (cols * cell - gutter)) / 2;
        var offsetY = (size - (rows * cell - gutter)) / 2;
        var dpr = window.devicePixelRatio || 1;
        canvas.width = size * dpr;
        canvas.height = size * dpr;
        context.scale(dpr, dpr);

        // Animation state: one fractional fill value (0..1) per dot
        var fills = new Float32Array(totalDots);
        var displayedMonths = 0;
        var currentAnimation = null;

        var WAVE_DOTS = 8; // how many dots make up the soft filling edge

        // Baby sprite (6 crawling poses, transparent background).
        // The baby natively faces right, so it is mirrored when crawling back.
        var BABY_FRAMES = 6;
        var BABY_CELL_W = 142;
        var BABY_CELL_H = 144;
        var BABY_H = 46; // display height in px
        var babyImg = new Image();
        var babyReady = false;
        var babyFrame = 0;
        var babyForward = true;
        // Baby position in canvas coords: it crawls in a straight line
        // from its current spot to the destination dot.
        var babyX = offsetX + radius; // dot 0 center
        var babyY = offsetY + radius;
        var babyFromX = babyX, babyFromY = babyY;
        var babyToX = babyX, babyToY = babyY;
        babyImg.onload = function() {
          babyReady = true;
          render();
        };
        babyImg.src = '/assets/imgs/baby-sprite.png';

        function easeInOutCubic(t) {
          return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        }

        function easeOutCubic(t) {
          return 1 - Math.pow(1 - t, 3);
        }

        function clamp01(v) {
          return v < 0 ? 0 : v > 1 ? 1 : v;
        }

        function drawDot(x, y, fillAmount) {
          context.beginPath();
          context.arc(x, y, radius, 0, 2 * Math.PI, false);
          context.fillStyle = 'white';
          context.fill();

          if (fillAmount > 0.001) {
            // sqrt so the dark area grows linearly with the fill amount
            context.beginPath();
            context.arc(x, y, radius * Math.sqrt(fillAmount), 0, 2 * Math.PI, false);
            context.fillStyle = '#0B1B4B';
            context.fill();
          }
        }

        function drawBaby() {
          if (!babyReady) return;
          var cx = babyX;
          var cy = babyY;
          var h = BABY_H;
          var w = h * BABY_CELL_W / BABY_CELL_H;
          var x = cx - w / 2;
          var y = cy + radius - h; // feet resting on the frontier dot
          if (y < 2) y = 2;
          if (x < 2) x = 2;
          if (x + w > size - 2) x = size - 2 - w;
          context.save();
          if (!babyForward) {
            // mirror around cx so the baby faces left
            context.translate(cx, 0);
            context.scale(-1, 1);
            context.translate(-cx, 0);
          }
          context.drawImage(
            babyImg,
            babyFrame * BABY_CELL_W, 0, BABY_CELL_W, BABY_CELL_H,
            x, y, w, h
          );
          context.restore();
        }

        function render() {
          context.clearRect(0, 0, size, size);
          var idx = 0;
          for (var i = 0; i < rows; i++) {
            for (var j = 0; j < cols; j++) {
              var centerX = offsetX + radius + cell * j;
              var centerY = offsetY + radius + cell * i;
              drawDot(centerX, centerY, fills[idx]);
              idx++;
            }
          }
          drawBaby();
        }

        function animateTo(months) {
          if (currentAnimation) {
            cancelAnimationFrame(currentAnimation);
            currentAnimation = null;
          }

          var from = displayedMonths;
          var forward = months >= from;
          babyForward = forward;

          // The baby crawls in a straight line to the destination dot,
          // in sync with the dot animation below.
          var targetIdx = months > 0 ? months - 1 : 0;
          babyFromX = babyX;
          babyFromY = babyY;
          babyToX = offsetX + radius + cell * (targetIdx % cols);
          babyToY = offsetY + radius + cell * Math.floor(targetIdx / cols);

          // Find the range of dots that are not yet at their target state
          var targets = new Uint8Array(totalDots);
          var first = -1, last = -1, k;
          for (k = 0; k < totalDots; k++) {
            targets[k] = k < months ? 1 : 0;
            if (Math.abs(fills[k] - targets[k]) > 0.001) {
              if (first === -1) first = k;
              last = k;
            }
          }
          if (first === -1) {
            displayedMonths = months;
            babyX = babyToX;
            babyY = babyToY;
            render();
            return;
          }

          var n = last - first + 1;
          // Each dot fills over a small window of the global timeline,
          // staggered so roughly WAVE_DOTS dots are mid-fill at any moment.
          var windowPortion = Math.min(0.6, WAVE_DOTS / n);
          var startFills = Float32Array.from(fills);

          var distance = Math.abs(months - from);
          var duration = Math.max(600, Math.min(2000, 300 + distance * 3));
          var startTime = null;

          function frame(timestamp) {
            if (startTime === null) startTime = timestamp;
            var t = Math.min((timestamp - startTime) / duration, 1);
            var p = easeInOutCubic(t);

            for (var idx = first; idx <= last; idx++) {
              var rank = forward ? idx - first : last - idx;
              var start = (rank / n) * (1 - windowPortion);
              var local = easeOutCubic(clamp01((p - start) / windowPortion));
              fills[idx] = startFills[idx] + (targets[idx] - startFills[idx]) * local;
            }

            displayedMonths = from + (months - from) * p;
            babyX = babyFromX + (babyToX - babyFromX) * p;
            babyY = babyFromY + (babyToY - babyFromY) * p;
            render();

            if (t < 1) {
              currentAnimation = requestAnimationFrame(frame);
            } else {
              // Snap to the exact final state
              for (var k2 = 0; k2 < totalDots; k2++) {
                fills[k2] = targets[k2];
              }
              displayedMonths = months;
              babyX = babyToX;
              babyY = babyToY;
              render();
              currentAnimation = null;
            }
          }

          currentAnimation = requestAnimationFrame(frame);
        }

        // Crawl cycle: fast while moving, a slow wiggle when idle.
        // During dot animations render() is driven by the rAF loop;
        // when idle the ticker repaints on each pose change.
        var tickCount = 0;
        setInterval(function() {
          tickCount++;
          if (currentAnimation) {
            babyFrame = (babyFrame + 1) % BABY_FRAMES;
          } else if (tickCount % 4 === 0) {
            babyFrame = (babyFrame + 1) % BABY_FRAMES;
            render();
          }
        }, 110);

        // Initial render
        render();

        // Reset everything to the beginning: all dots empty, baby at the start
        function resetToStart() {
          fills.fill(0);
          displayedMonths = 0;
          babyForward = true;
          babyX = babyFromX = babyToX = offsetX + radius;
          babyY = babyFromY = babyToY = offsetY + radius;
        }

        // Add click handler
        checkBtn.addEventListener('click', function() {
          var age = parseInt(ageInput.value, 10);
          if (isNaN(age) || age < 0 || age > 90) {
            alert('Please enter a valid age between 0 and 90');
            return;
          }
          resetToStart();
          animateTo(age * 12);
        });

        // Add enter key handler
        ageInput.addEventListener('keypress', function(e) {
          if (e.key === 'Enter') {
            checkBtn.click();
          }
        });
      </script>

    </div>
  </body>
</html>
