<script>
  const TRACKS = [{"id":"snow","title":"三月的雪","year":2026,"duration":"1:53","description":"北京三月还在飘雪，不寻常的天气让我想写首歌来记录一下。","cover":"/v1/assets/imgs/music/snow.png","audio":"https://pub-9173ebfb78bc4cf292bc3d8878314a79.r2.dev/snow.mp3","lyrics":"现在是三月了，北京还在飘雪呢，土地沉默的叹息升腾起来，缠绕在雪里。\n\n星星跳出来又缩回去，它们不敢看我的眼睛，谁知我也有点害羞呢。\n\n冷酷的人们，彼此交换纯洁的眼神，心照不宣的秘密，都随着脆弱的生命离去。\n\n黎明并不明亮，温暖的潮水开始退缩，它畏手畏脚，不喜欢自己的样子。\n\n风自远处吹来，掠过星星，飞往更远的地方。呼唤它也于事无补，只因它害怕雪的冰冷。\n"},{"id":"snake","title":"蛇结","year":2026,"duration":"2:27","description":"读完小说《蛇结》有感而发，写了这首歌。","cover":"/v1/assets/imgs/music/snake.png","audio":"https://pub-9173ebfb78bc4cf292bc3d8878314a79.r2.dev/snake.mp3","lyrics":"仇恨已将我吞噬\n它幻化成名利 欲望 金钱 爱情\n它靠近我 嘲笑我 又将我推开\n我报之以歌 不如报之以刀\n我的心里\n将要溢满鲜血\n\n椴树开花啦\n小河里的冰融化啦\n葡萄园里的果子熟啦\n青鸟鸣虫开始欢唱\n我也有开心的时候呀\n在那些不眠的夜晚\n连风都是甜的\n\n我的孩子都怕我\n他们渴望我的遗产\n唯有你 我的爱人\n只是单纯的忽略我 鄙视我\n也许是我的错觉\n否则你走时 我为何心痛\n\n风缓下来了\n咖啡变凉了\n神父离开了\n我将要走了\n我解不开这蛇结\n只能带着它走了\n走了\n"},{"id":"moon","title":"半个月亮","year":2026,"duration":"3:10","description":"冬日清晨去送孩子上学，看到半个月亮挂在天上，觉得很美，就写了这首歌。","cover":"/v1/assets/imgs/music/moon.png","audio":"https://pub-9173ebfb78bc4cf292bc3d8878314a79.r2.dev/moon.mp3","lyrics":"半个月亮挂在天上\n蓝雾从空中掠过\n怪物鼻孔喷出白烟\n水银坠落\n\n为谁停留\n为谁走\n\n风吹过雪地不语\n红叶在枝头叹息\n热带雨林在燃烧\n沙漠挖出宝藏\n\n为谁停留\n为谁走\n\n盲人重获光明\n祭坛下堆满旧草人\n鲜花竞相开放\n蚂蚁从镜面经过\n\n为谁停留\n为谁走\n"},{"id":"meeting","title":"战略会议","year":2026,"duration":"2:44","description":"每天都要开很多会议，感觉很浪费时间，就写了这首歌来吐槽一下。","cover":"/v1/assets/imgs/music/meeting.png","audio":"https://pub-9173ebfb78bc4cf292bc3d8878314a79.r2.dev/meeting.mp3","lyrics":"他们教自己变成大象\n也没有什么战略思想\n\n借着暖和的阳光\n晾晒不穿的衣裳\n下雨了就在屋檐下躲藏\n刮风了就关上门窗\n\n他们不想做普通的大象\n他们组织了战略会议\n他们互相追问\n什么是你的战略思想\n\n我要邀请蚂蚁来吃饭\n我要请老鼠做推广\n好啊 好啊 不要停留 朝前走\n\n我要在荷叶上办舞会\n我要和青蛙手牵手\n好啊 好啊\n你们一起朝前走\n\n大象还是大象\n他们想多开几次会议\n那时候他们不再像自己\n而是比自己更有魅力\n更有战略思想"}];
